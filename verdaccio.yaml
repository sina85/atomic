# Verdaccio config for the publish-validation job.
# Lets the validate workflow exercise the real publish + install code path
# against a throwaway local registry — catches publish-layout regressions
# (synthesised wrapper, optionalDependencies resolution) before
# we touch the public registry.
#
# Anonymous publish is intentional: the validate job runs in a hermetic CI
# step and the registry is destroyed when the runner exits.

# Paths are config-relative so the same file works on every CI runner OS
# (Windows /tmp doesn't map to a node-readable path).
storage: ./.verdaccio-storage
listen: 0.0.0.0:4873

# Per-platform binary tarballs are ~50MB compiled; bump from the 10MB default.
max_body_size: 200mb

auth:
  htpasswd:
    file: ./.verdaccio-htpasswd
    max_users: -1

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  # `@bastani/*` MUST NOT proxy to npmjs — otherwise verdaccio could serve a
  # previously-released version when our local publish is missing a tarball,
  # silently masking regressions.
  "@bastani/*":
    access: $all
    publish: $anonymous
    unpublish: $anonymous

  # Everything else (e.g. transitive deps pulled by `bun install -g`) proxies
  # through to npmjs as a read-only mirror.
  "**":
    access: $all
    publish: $authenticated
    proxy: npmjs

log:
  type: stdout
  format: pretty
  level: warn
