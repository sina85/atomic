# Atomic tmux configuration — injected automatically via -f
# Shared by tmux (macOS/Linux) and psmux (Windows)
#
# True color + passthrough for rich TUI rendering
set-option -sa terminal-overrides ",xterm*:Tc"
set -g set-clipboard on
set -g allow-passthrough on

# Mouse mode — scroll works out of the box
set-option -g mouse on

# Prevent processes from overwriting window titles
set-option -g allow-rename off

# Sane defaults (inlined from tmux-sensible)
set -g escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on

# Status bar — left to defaults. The attached-mode footer is rendered
# into status-left/status-right by the SDK at session-create time
# (see runtime/attached-footer.ts and tui/renderer.ts).

# Pane resizing
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r k resize-pane -U 5
bind -r j resize-pane -D 5

# Vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Atomic workflow navigation (prefix-free) ──────────────
# These bindings use `bind -n` (root table) so they work without a prefix key.
# They only apply inside Atomic's isolated tmux server (-L atomic) and do NOT
# affect the user's regular tmux or shell sessions.
#
# NOTE: Ctrl+\ overrides the default SIGQUIT signal.  Agent CLIs running in
# these panes will not receive SIGQUIT via Ctrl+\.  Use `kill -QUIT <pid>` if
# needed.  The integrated agents (Claude Code, OpenCode, Copilot CLI) use
# Ctrl+C for interrupts and are not affected.

# Ctrl+G: jump straight back to the graph (window 0) from any agent window
bind -n C-g select-window -t :0

# Ctrl+\: cycle to next agent window from anywhere
bind -n C-\\ next-window

# Ctrl+C handling — for workflow sessions, debounce bursts so the agent's
# "double-tap to exit" doesn't trigger on accidental spam. For chat
# sessions (atomic-chat-*) the user is in direct control of the single
# agent CLI and a deliberate double-tap exit must reach the agent
# verbatim, so we forward Ctrl+C unmodified.
#
# @atomic-cc-debounce is set by tmux.ts on session creation to a fully
# quoted self-re-exec command — `<atomic-binary> _cc-debounce` in
# compiled-binary mode, or `<bun> <cli.ts> _cc-debounce` in dev. No PATH
# lookup needed inside run-shell.
bind -n C-c if-shell -F '#{m:atomic-chat-*,#{session_name}}' \
  'send-keys C-c' \
  'run-shell -b "#{@atomic-cc-debounce} \"#{pane_id}\""'

# Escape exits copy-mode (clear selection first if one exists, otherwise cancel)
bind-key -T copy-mode-vi Escape if-shell -F "#{selection_present}" "send-keys -X clear-selection" "send-keys -X cancel"

# Copy-mode mouse bindings:
#   - Drag: begin selection + disable scroll-exit (prevents losing selection if dragged to bottom)
#   - Drag end: copy to system clipboard (via OSC52) and exit copy-mode
#   - Click: clear any selection (but stay in copy-mode for continued scrolling)
bind -T copy-mode-vi MouseDrag1Pane    select-pane \; send-keys -X begin-selection \; send-keys -X scroll-exit-off
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDown1Pane    send-keys -X clear-selection \; select-pane

# ── Workflow protection: unbind destructive and layout-changing defaults ──
# Atomic manages the tmux session lifecycle programmatically. Users should
# interact with agents and navigate via Ctrl+G / Ctrl+\ / the graph panel.
# The prefix key (C-b) is kept only for copy-mode entry (C-b [).
#
# Note: In practice, C-b is largely unreachable inside Atomic sessions because
# the agent TUIs (Claude Code, OpenCode, Copilot CLI) run in raw/alternate
# screen mode and capture keyboard input — including Ctrl+b — before tmux ever
# sees it. This makes all prefix-based bindings effectively inaccessible during
# normal agent interaction. The unbinds below are a defense-in-depth measure
# for the edge case where a user exits an agent back to a bare shell prompt.
#
# Bindings intentionally kept (non-destructive or low-risk):
#   C-b [   copy-mode entry (keyboard fallback for mouse scroll)
#   C-b :   command prompt (requires typing a full command — low accidental risk)
#   C-b d   detach (non-destructive; just disconnects the client)

# Prevent window/pane destruction
unbind &          # kill-window
unbind x          # kill-pane

# Prevent window/pane creation — Atomic owns the layout. User-initiated
# splits or new windows would desync the executor's pane registry and
# leave orphaned shells inside workflow/chat sessions.
unbind c          # new-window
unbind '"'        # default split vertical
unbind %          # default split horizontal

# Prevent renaming
unbind ,          # rename-window
unbind '$'        # rename-session

# Prevent automatic window renaming (complements allow-rename off above)
setw -g automatic-rename off
