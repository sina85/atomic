name: Publish tag created
run-name: Publish tag signal ${{ github.ref_name }}

# This workflow is deliberately unprivileged because a create event can select
# the workflow definition at the created tag. Its completed run is only a
# signal; publish.yml is selected separately from the protected default branch
# and revalidates every release input.
on:
    create:

permissions: {}

jobs:
    signal:
        name: Signal protected publisher
        runs-on: ubuntu-latest
        steps:
            - name: Record untrusted tag signal
              env:
                  REF_TYPE: ${{ github.ref_type }}
                  RELEASE_TAG: ${{ github.ref_name }}
                  TRIGGER_SHA: ${{ github.sha }}
                  WORKFLOW_REF: ${{ github.workflow_ref }}
              run: |
                  if [[ "$REF_TYPE" != "tag" ]]; then
                    echo "Rejecting non-tag create signal: ref_type=$REF_TYPE" >&2
                    exit 1
                  fi
                  printf 'Untrusted tag signal: tag=%s sha=%s workflow_ref=%s\n' \
                    "$RELEASE_TAG" "$TRIGGER_SHA" "$WORKFLOW_REF"
