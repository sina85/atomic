name: SDK Fixture Smoke

# ── Triggers ──────────────────────────────────────────────────────────────────
#
# pre-publish  — every PR that touches atomic-sdk, atomic, or the fixture
# nightly      — schedule to catch Bun runtime drift
# post-publish — release event fires after publish.yml creates the GitHub Release
# manual       — workflow_dispatch for ad-hoc runs
on:
  pull_request:
    branches: [main]
    paths:
      - "packages/atomic-sdk/**"
      - "packages/atomic/**"
      - "tests/fixtures/sdk-compiled-consumer/**"
      - ".github/workflows/sdk-fixture-smoke.yml"
  schedule:
    - cron: "0 7 * * *" # nightly UTC
  release:
    types: [published]
  workflow_dispatch:

# Only one run per ref at a time; don't cancel mid-flight (same reasoning
# as publish.yml — a cancelled mid-matrix run leaves an ambiguous result).
concurrency:
  group: sdk-fixture-smoke-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Cross-platform smoke matrix ──────────────────────────────────────────────
  #
  # Steps validated (see tests/fixtures/sdk-compiled-consumer/README.md):
  #   1  bun install
  #   2  host-bun: `bun src/cli.ts greet`     — `kind=host-bun` resolution
  #   3  bun build --compile → dist/my-app
  #   4  compiled: `dist/my-app greet`        — handleSelfDispatch + override
  #   5  compiled w/ ATOMIC_DISABLE_DEFAULT_EXEC=1 — assert NoDispatcherError
  #   6  host-bun re-run                      — idempotency
  #
  # All six steps run on every trigger; the fixture's behaviour does NOT
  # depend on per-platform binary packages (the SDK now defaults to its
  # own prebundled cli.ts, not to atomic's binary).
  #
  # For PR / schedule runs the fixture installs against a locally packed
  # SDK tarball so the CI tests the PR's current state. For release runs
  # the fixture installs against the published prerelease.
  #
  # Matrix:
  #   ubuntu-latest          → linux-x64 glibc
  #   ubuntu-latest (alpine) → linux-x64-musl (container)
  #   ubuntu-24.04-arm       → linux-arm64 glibc
  #   macos-latest           → darwin-arm64 (Apple Silicon)
  #   macos-13               → darwin-x64
  #   windows-latest         → win32-x64
  #
  # TODO(linux-arm64-musl): no ubuntu-arm alpine runner on GitHub Actions free tier.
  # TODO(win32-arm64): no windows-arm64 runner on GitHub Actions.
  smoke:
    name: Smoke ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── linux-x64 glibc ───────────────────────────────────────────────
          - name: linux-x64
            runs-on: ubuntu-latest
            container: ""
            shell: bash

          # ── linux-x64-musl (alpine container) ─────────────────────────────
          - name: linux-x64-musl
            runs-on: ubuntu-latest
            container: "oven/bun:alpine"
            shell: sh

          # ── linux-arm64 glibc ─────────────────────────────────────────────
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            container: ""
            shell: bash

          # ── linux-arm64-musl ──────────────────────────────────────────────
          # TODO: no arm64 alpine runner on GitHub Actions free tier.
          # - name: linux-arm64-musl
          #   runs-on: ubuntu-24.04-arm
          #   container: "oven/bun:alpine"

          # ── darwin-arm64 (Apple Silicon, recent macos-latest) ─────────────
          - name: darwin-arm64
            runs-on: macos-latest
            container: ""
            shell: bash

          # ── darwin-x64 ────────────────────────────────────────────────────
          - name: darwin-x64
            runs-on: macos-26-intel
            container: ""
            shell: bash

          # ── windows-x64 ───────────────────────────────────────────────────
          - name: windows-x64
            runs-on: windows-latest
            container: ""
            shell: bash

          # ── windows-arm64 ─────────────────────────────────────────────────
          # TODO: no windows-arm64 runner on GitHub Actions.
          # - name: windows-arm64
          #   runs-on: windows-11-arm

    runs-on: ${{ matrix.runs-on }}
    # Empty string means no container; only the musl row sets a real image.
    container: ${{ matrix.container || '' }}

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # setup-bun is not needed inside oven/bun:alpine (bun is pre-installed).
      - name: Setup Bun
        if: matrix.container == ''
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # ── Pre-publish / nightly: pack SDK to local tarball ─────────────────
      # `script/pack.ts` builds dist/, rewrites package.json's exports
      # from `./src/<file>.ts` to `{ types, import }` pointing at
      # `./dist/`, and runs `bun pm pack` so the tarball matches the
      # shape `script/publish.ts` would publish to npm. Without that
      # rewrite, the fixture's `bun install` against the tarball
      # resolves `@bastani/atomic-sdk/workflows` to a `./src/...` path
      # that isn't shipped (`files: ["dist"]`), throwing
      # `Cannot find module`.
      #
      # We deliberately don't use `npm pack` because the alpine row
      # runs in `oven/bun:alpine`, which has no npm.
      - name: Pack SDK tarball (pre-publish / nightly)
        if: github.event_name != 'release'
        id: pack-sdk
        run: |
          TARBALL=$(bun packages/atomic-sdk/script/pack.ts)
          echo "tarball-file=${TARBALL}" >> "$GITHUB_OUTPUT"

      # Rewrite the fixture's @bastani/atomic-sdk dependency to point at the
      # local tarball so `bun install` inside smoke.ts picks it up.
      # Uses a relative path from the fixture so it works cross-platform —
      # `$(pwd)` on Windows Git Bash returns a Unix-style path
      # (`/d/a/...`) that bun's Windows install path resolution can't
      # consume.
      - name: Patch fixture to use local SDK tarball (pre-publish / nightly)
        if: github.event_name != 'release'
        env:
          TARBALL_FILE: ${{ steps.pack-sdk.outputs.tarball-file }}
        run: |
          cd tests/fixtures/sdk-compiled-consumer
          bun -e "
            const pkg = await Bun.file('package.json').json();
            const rel = '../../../packages/atomic-sdk/' + process.env.TARBALL_FILE;
            pkg.dependencies['@bastani/atomic-sdk'] = 'file:' + rel;
            await Bun.write('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # ── Post-publish: pin to published prerelease ─────────────────────────
      - name: Get published version (post-publish)
        if: github.event_name == 'release'
        id: release-version
        run: |
          # The release tag is e.g. "v0.8.0-0"; strip the leading "v".
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Patch fixture to use published prerelease (post-publish)
        if: github.event_name == 'release'
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          cd tests/fixtures/sdk-compiled-consumer
          bun -e "
            const pkg = await Bun.file('package.json').json();
            pkg.dependencies['@bastani/atomic-sdk'] = '${VERSION}';
            await Bun.write('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # ── Install tmux/psmux for steps 2/4/6 ────────────────────────────────
      - name: Install tmux (linux glibc)
        if: runner.os == 'Linux' && matrix.container == ''
        run: sudo apt-get update -qq && sudo apt-get install -y tmux

      - name: Install tmux (linux musl/alpine container)
        if: matrix.container != ''
        run: apk add --no-cache tmux

      - name: Install tmux (macos)
        if: runner.os == 'macOS'
        run: brew install tmux || true

      # psmux is the Windows port of tmux; downloaded from the pinned
      # GitHub release (the same path `installPsmuxFromGitHubRelease`
      # in spawn.ts uses). Mirrors `.github/workflows/ci.yml`'s
      # runtime-assets-smoke setup.
      - name: Install psmux (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          # Authenticated requests get the 1000/hr per-repo rate limit; the
          # unauthenticated 60/hr limit is shared across all GitHub-hosted
          # runners on the same egress IP and trips intermittently on busy days.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $latest = Invoke-RestMethod `
              -Headers @{
                  Accept        = 'application/vnd.github+json'
                  Authorization = "Bearer $env:GH_TOKEN"
              } `
              -Uri 'https://api.github.com/repos/psmux/psmux/releases/latest'
          $asset = $latest.assets | Where-Object { $_.name -like '*windows-x64.zip' } | Select-Object -First 1
          if (-not $asset) { throw 'No psmux windows-x64 release asset found' }
          $tmp = New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP 'psmux')
          $zip = Join-Path $tmp 'psmux.zip'
          Invoke-WebRequest -UseBasicParsing -Uri $asset.browser_download_url -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath $tmp -Force
          $bin = Join-Path $env:LOCALAPPDATA 'Programs\psmux'
          New-Item -ItemType Directory -Force -Path $bin | Out-Null
          Get-ChildItem $tmp -Filter 'psmux.exe' -Recurse | ForEach-Object {
              Copy-Item $_.FullName -Destination (Join-Path $bin 'psmux.exe') -Force
          }
          echo $bin >> $env:GITHUB_PATH

      # ── Run the full six-step smoke matrix ────────────────────────────────
      - name: Run smoke matrix
        run: bun tests/fixtures/sdk-compiled-consumer/scripts/smoke.ts --verbose

      # ── Upload artifacts on failure ────────────────────────────────────────
      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-artifacts-${{ matrix.name }}-${{ github.run_id }}
          path: |
            tests/fixtures/sdk-compiled-consumer/dist/
            tests/fixtures/sdk-compiled-consumer/orchestrator.log
          if-no-files-found: ignore
          retention-days: 7
