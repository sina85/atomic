name: Publish

on:
  pull_request:
    types: [closed]
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  # Never cancel mid-flight: cancellation between the per-platform
  # publishes (or between platform-publish and wrapper-publish) leaves
  # npm partially populated, and same-version republishes are rejected.
  # Queue subsequent runs instead of interrupting this one.
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    if: >-
      github.event_name != 'pull_request'
      || (github.event.pull_request.merged == true
      && (startsWith(github.event.pull_request.head.ref, 'release/')
      || startsWith(github.event.pull_request.head.ref, 'prerelease/')))
    strategy:
      matrix:
        target:
          - { name: linux-x64,          runner: ubuntu-latest }
          - { name: linux-arm64,        runner: ubuntu-latest }
          - { name: linux-x64-musl,     runner: ubuntu-latest }
          - { name: linux-arm64-musl,   runner: ubuntu-latest }
          - { name: darwin-x64,         runner: ubuntu-latest }
          - { name: darwin-arm64,       runner: ubuntu-latest }
          - { name: windows-x64,        runner: ubuntu-latest }
          - { name: windows-arm64,      runner: ubuntu-latest }
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # `--cpu=* --os=*` overrides the host filter so all OpenTUI native
      # packages (`@opentui/core-{darwin,linux,win32}-{x64,arm64}`) land
      # in node_modules. Bun's `--compile --target=...` rewrites
      # `process.platform`/`process.arch` at bundle time to the target,
      # so without these flags cross-compile fails to resolve the
      # target's native module on the build host.
      - run: bun install --cpu='*' --os='*'

      - run: bun packages/atomic/script/build.ts ${{ matrix.target.name }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.name }}
          path: packages/atomic/dist/${{ matrix.target.name }}

  # Single pre-publish gate: each runner spins up its own verdaccio,
  # publishes the just-built artifacts to it, then exercises the full
  # `bun install -g` + `atomic install` lifecycle (launcher placement,
  # rc edits, completions cache, mux auto-install, uninstall, --purge).
  # Catches regressions BEFORE we touch the public npm registry, so a
  # bad publish never reaches users.
  validate:
    name: Validate ${{ matrix.os }} ${{ matrix.arch }}${{ matrix.libc == 'musl' && ' (musl)' || '' }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x64,   mux: true,  preflight: true,  libc: glibc }
          - { os: ubuntu-24.04-arm, arch: arm64, mux: false, preflight: false, libc: glibc }
          - { os: macos-26-intel,   arch: x64,   mux: false, preflight: false, libc: glibc }
          - { os: macos-latest,     arch: arm64, mux: true,  preflight: false, libc: glibc }
          - { os: windows-latest,   arch: x64,   mux: true,  preflight: false, libc: glibc }
          - { os: windows-11-arm,   arch: arm64, mux: false, preflight: false, libc: glibc }
          # musl row mirrors the linux x64 glibc row's mux/preflight choices
          # so auto-install + chat-preflight paths get exercised against musl
          # too. arm64 musl is intentionally absent: GitHub Actions blocks
          # JavaScript actions inside Alpine containers on ARM64 runners
          # (https://github.com/actions/runner/issues/801) — the runner ships
          # no node externals for that combo, so `actions/checkout` aborts
          # before any of our steps can run. x64 coverage is sufficient to
          # catch musl-vs-glibc regressions in the install + launcher paths.
          - { os: ubuntu-latest,    arch: x64,   mux: true,  preflight: true,  libc: musl,
              container: 'node:lts-alpine' }
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      # Alpine bootstrap: must run before any other step so `actions/checkout`
      # can clone with native git (faster than the API tarball fallback) and
      # later steps have bash/jq/tmux/libstdc++ available. node + npm are
      # pre-installed in `node:lts-alpine`; we skip `setup-node` below since
      # its prebuilt binaries are glibc-linked and would crash on Alpine.
      # `oven-sh/setup-bun@v2` is also skipped on musl: it unconditionally
      # fetches the glibc bun zip, which can't load Alpine's musl linker.
      # The upstream `bun.sh/install` script reads /etc/os-release and
      # selects the musl variant, so we run it here and prepend ~/.bun/bin
      # to PATH for subsequent steps.
      - name: Bootstrap Alpine toolchain (musl rows)
        if: matrix.libc == 'musl'
        shell: sh
        run: |
          set -e
          apk add --no-cache git bash curl jq tmux libstdc++ libgcc unzip
          curl -fsSL https://bun.sh/install | bash
          # `bun.sh/install` only drops `bun`; `setup-bun@v2` also creates a
          # `bunx` symlink, which scripts using `bun $ \`bunx ...\`` rely on.
          ln -sf bun "$HOME/.bun/bin/bunx"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          "$HOME/.bun/bin/bun" --version
          "$HOME/.bun/bin/bunx" --version

      - uses: actions/checkout@v6

      - if: matrix.libc != 'musl'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - if: matrix.libc == 'glibc'
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - run: bun install

      - uses: actions/download-artifact@v8
        with:
          path: packages/atomic/dist/
          pattern: '*'
          merge-multiple: false

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      # Verdaccio is a node app and runs on every CI OS via setup-node's
      # npm. Config paths in verdaccio.yaml are config-relative so the
      # storage/htpasswd files land next to the config regardless of OS.
      - name: Start verdaccio
        shell: bash
        run: |
          npm install -g verdaccio
          verdaccio --config verdaccio.yaml > "$RUNNER_TEMP/verdaccio.log" 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4873/-/ping >/dev/null; then
              echo "verdaccio up"; exit 0
            fi
            sleep 1
          done
          echo "verdaccio failed to start" >&2
          cat "$RUNNER_TEMP/verdaccio.log" || true
          exit 1

      - name: Configure npm auth for verdaccio
        shell: bash
        run: echo "//localhost:4873/:_authToken=fake-token" >> ~/.npmrc

      - name: Publish SDK to verdaccio
        shell: bash
        env:
          NPM_REGISTRY: http://localhost:4873
        run: bun packages/atomic-sdk/script/publish.ts

      # ── SDK self-containment regression guard. Installs
      #    @bastani/atomic-sdk into a fresh project (no monorepo, no
      #    user-facing CLI alongside) and exercises every property of
      #    the bundled-dispatcher fix: dist/cli.js exists, the published
      #    package.json declares ./cli + ./runtime/footer-command,
      #    Commander dispatches the hidden subcommands, and the
      #    runtime resolver lands inside the installed SDK with no
      #    sibling-package walk. Runs before the wrapper is published so
      #    it provably has nothing else to fall back on.
      - name: Verify SDK is self-contained
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bun packages/atomic-sdk/script/verify-bundled-cli.ts \
            http://localhost:4873 \
            "$VERSION"

      - name: Publish wrapper + all platform packages to verdaccio
        shell: bash
        env:
          NPM_REGISTRY: http://localhost:4873
        run: bun packages/atomic/script/publish.ts

      # ── On `mux: true` rows, strip tmux/psmux so the auto-install path
      #    triggered by `atomic workflow list` (ensureTmuxInstalled) is
      #    actually exercised end-to-end.
      - name: Strip tmux (Linux mux row)
        if: matrix.mux && runner.os == 'Linux' && matrix.libc == 'glibc'
        shell: bash
        run: |
          sudo apt-get remove -y tmux >/dev/null 2>&1 || true
          if command -v tmux >/dev/null 2>&1; then
            echo "tmux still on PATH after remove"; exit 1
          fi

      # Alpine has no apt-get / sudo; the bootstrap step above installed tmux,
      # so `apk del` here mirrors the glibc strip and lets atomic's auto-install
      # path run from a clean state.
      - name: Strip tmux (Alpine mux row)
        if: matrix.mux && matrix.libc == 'musl'
        shell: sh
        run: |
          apk del tmux 2>/dev/null || true
          if command -v tmux >/dev/null 2>&1; then
            echo "tmux still on PATH after apk del"; exit 1
          fi

      - name: Strip tmux (macOS mux row)
        if: matrix.mux && runner.os == 'macOS'
        shell: bash
        run: |
          if command -v tmux >/dev/null 2>&1; then
            brew uninstall --ignore-dependencies tmux >/dev/null 2>&1 || true
          fi
          if command -v tmux >/dev/null 2>&1; then
            echo "tmux still on PATH after uninstall"; exit 1
          fi

      - name: Strip psmux (Windows mux row)
        if: matrix.mux && runner.os == 'Windows'
        shell: pwsh
        run: |
          $existing = Get-Command psmux -ErrorAction SilentlyContinue
          if ($existing) {
            throw "psmux already on PATH at $($existing.Source) — test cannot verify auto-install"
          }
          foreach ($d in @(
            (Join-Path $env:LOCALAPPDATA 'Programs\psmux'),
            (Join-Path $env:LOCALAPPDATA 'Microsoft\WinGet\Links'),
            (Join-Path $env:USERPROFILE 'scoop\shims')
          )) {
            if (Test-Path (Join-Path $d 'psmux.exe')) {
              Write-Output "Removing pre-existing $d\psmux.exe"
              Remove-Item -Force (Join-Path $d 'psmux.exe') -ErrorAction SilentlyContinue
            }
          }

      # ── Install via bun from verdaccio. This exercises the same code
      #    path users hit with `bun install -g @bastani/atomic`, but
      #    against our local registry holding the just-built artifacts.
      - name: Install atomic from verdaccio (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bun install -g "@bastani/atomic@${VERSION}" --registry http://localhost:4873

      - name: Install atomic from verdaccio (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bun install -g "@bastani/atomic@$env:VERSION" --registry http://localhost:4873
          # bun writes its bin dir to user PATH; pull it into this session.
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }

      # ── Smoke checks: version, workflow list, version-keyed cache extraction.
      - name: Smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          atomic --version | grep -q "$VERSION"
          atomic workflow list >/dev/null
          if [ "$RUNNER_OS" = "Linux" ]; then
            test -d "${XDG_CACHE_HOME:-$HOME/.cache}/atomic/${VERSION}/skills"
          else
            test -d "$HOME/Library/Caches/atomic/${VERSION}/skills"
          fi

      - name: Smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          $ver = & atomic --version
          if (-not ($ver -match [regex]::Escape($env:VERSION))) {
            throw "version mismatch: expected $env:VERSION, got $ver"
          }
          atomic workflow list | Out-Null
          $cache = if ($env:LOCALAPPDATA) { $env:LOCALAPPDATA } else { Join-Path $env:USERPROFILE 'AppData\Local' }
          $expected = Join-Path $cache "atomic\Cache\$env:VERSION\skills"
          if (-not (Test-Path $expected)) { throw "missing: $expected" }

      # ── Chat preflight (canary): runs onboarding for each agent with
      #    `--preflight-only` (no agent spawn / auth checks). Single row
      #    is enough — this exercises agent-agnostic config sync.
      - name: Chat preflight (canary)
        if: matrix.preflight
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          for agent in claude copilot opencode; do
            atomic chat -a "$agent" --preflight-only
          done

      # ── Pm-managed install policy: while atomic still runs from the
      #    bun-global install dir (~/.bun/install/global/.../@bastani/
      #    atomic-<plat>-<arch>/bin/), `atomic uninstall` MUST refuse and
      #    point the user at `bun remove -g @bastani/atomic` — running
      #    cleanup on a pm-managed install would leave dangling links and
      #    a broken `atomic` shim.
      #
      #    This step runs BEFORE `atomic install` migrates the launcher
      #    to the canonical binary dir (which would flip detection to the
      #    "binary" branch and re-enable cleanup).
      - name: atomic uninstall refuses on bun install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          out=$(atomic uninstall 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            echo "expected non-zero exit on a bun-managed install"; exit 1
          fi
          echo "$out" | grep -q "atomic was installed via bun" \
            || { echo "missing 'atomic was installed via bun' hint"; exit 1; }
          echo "$out" | grep -q "bun remove -g @bastani/atomic" \
            || { echo "missing 'bun remove -g' hint"; exit 1; }
          command -v atomic >/dev/null 2>&1 \
            || { echo "atomic disappeared after refusal — must touch nothing"; exit 1; }

      - name: atomic uninstall refuses on bun install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # GitHub Actions pwsh sets $PSNativeCommandUseErrorActionPreference=$true
          # plus $ErrorActionPreference='Stop', which turns any non-zero exit
          # from a native command into a terminating error before we can read
          # $LASTEXITCODE. Disable for this step so the deliberate exit-1
          # refusal can be asserted against, not propagated.
          $PSNativeCommandUseErrorActionPreference = $false
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          $out = atomic uninstall 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Output $out
          if ($rc -eq 0) {
            throw "expected non-zero exit on a bun-managed install"
          }
          if ($out -notmatch 'atomic was installed via bun') {
            throw "missing 'atomic was installed via bun' hint"
          }
          if ($out -notmatch 'bun remove -g @bastani/atomic') {
            throw "missing 'bun remove -g' hint"
          }
          if (-not (Get-Command atomic -ErrorAction SilentlyContinue)) {
            throw "atomic disappeared after refusal — must touch nothing"
          }

      # ── `atomic update` on a PM-managed install (no --check): refuses
      #    with exit 1 and tells the user to run `bun update -g`. Sister
      #    test to the uninstall refusal above; covers the second exit-1
      #    branch in the PM-detection path of update.ts.
      - name: atomic update refuses on bun install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          out=$(atomic update 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            echo "expected non-zero exit on a bun-managed install"; exit 1
          fi
          echo "$out" | grep -q "atomic update is not available for bun" \
            || { echo "missing 'not available for bun' hint"; exit 1; }
          echo "$out" | grep -q "bun update -g @bastani/atomic" \
            || { echo "missing 'bun update -g' hint"; exit 1; }
          command -v atomic >/dev/null 2>&1 \
            || { echo "atomic disappeared after refusal — must touch nothing"; exit 1; }

      - name: atomic update refuses on bun install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          $out = atomic update 2>&1 | Out-String
          $rc = $LASTEXITCODE
          Write-Output $out
          if ($rc -eq 0) {
            throw "expected non-zero exit on a bun-managed install"
          }
          if ($out -notmatch 'atomic update is not available for bun') {
            throw "missing 'not available for bun' hint"
          }
          if ($out -notmatch 'bun update -g @bastani/atomic') {
            throw "missing 'bun update -g' hint"
          }
          if (-not (Get-Command atomic -ErrorAction SilentlyContinue)) {
            throw "atomic disappeared after refusal — must touch nothing"
          }

      # ── Round-trip the documented pm uninstall path: `bun remove -g`
      #    is what the refusal message above tells users to run, so we
      #    smoke-test it actually evicts atomic from PATH.
      - name: bun remove -g round-trip (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun remove -g @bastani/atomic
          if command -v atomic >/dev/null 2>&1; then
            echo "atomic still on PATH after 'bun remove -g'"; exit 1
          fi

      - name: bun remove -g round-trip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          bun remove -g @bastani/atomic
          if (Get-Command atomic -ErrorAction SilentlyContinue) {
            throw "atomic still on PATH after 'bun remove -g'"
          }

      # ── Re-install via bun so the binary-branch lifecycle steps below
      #    have a fresh atomic to migrate via `atomic install`.
      - name: Re-install atomic from verdaccio (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bun install -g "@bastani/atomic@${VERSION}" --registry http://localhost:4873

      - name: Re-install atomic from verdaccio (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bun install -g "@bastani/atomic@$env:VERSION" --registry http://localhost:4873
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }

      # ── `atomic install` lifecycle: drops launcher into the canonical
      #    install dir, writes rc snippets / profile wrapper, caches
      #    completions. Mirrors the install path users hit after running
      #    `bun install -g @bastani/atomic`.
      - name: atomic install (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          atomic install

      - name: atomic install + load wrapper (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          atomic install
          # Dot-source $PROFILE to load the freshly-written wrapper into
          # this shell. Subsequent `atomic` calls now go through the
          # wrapper function, which re-merges HKCU\Environment\Path
          # after each invocation — required for mux auto-install to be
          # observable in this same shell.
          if (-not (Test-Path $PROFILE)) {
            throw "atomic install did not create $PROFILE"
          }
          . $PROFILE
          $wrapper = Get-Command atomic -ErrorAction Stop
          if ($wrapper.CommandType -ne 'Function') {
            throw "expected atomic to resolve to Function (the wrapper); got $($wrapper.CommandType)"
          }

      - name: Verify launcher prod location (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          binary="$HOME/.local/bin/atomic"
          test -f "$binary" || { echo "expected prod binary at $binary"; exit 1; }
          test -x "$binary" || { echo "$binary is not executable"; exit 1; }
          size=$(stat -c%s "$binary" 2>/dev/null || stat -f%z "$binary")
          if [ "$size" -lt 1000000 ]; then
            echo "$binary is suspiciously small ($size bytes)"; exit 1
          fi
          echo "prod binary OK at $binary ($size bytes)"

      - name: Verify launcher prod location (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $env:LOCALAPPDATA "atomic\bin\atomic.exe"
          if (-not (Test-Path $binary)) {
            throw "expected prod binary at $binary"
          }
          $size = (Get-Item $binary).Length
          if ($size -lt 1MB) {
            throw "$binary is suspiciously small ($size bytes)"
          }
          Write-Output "prod binary OK at $binary ($size bytes)"

      - name: Verify completions cache (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ls -la "$HOME/.atomic/completions/"
          ls "$HOME/.atomic/completions/" | grep -E "atomic\.(bash|zsh|fish)"

      - name: Verify completions cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cache = Join-Path $env:USERPROFILE ".atomic\completions\atomic.ps1"
          if (-not (Test-Path $cache)) { throw "completions cache missing: $cache" }
          $size = (Get-Item $cache).Length
          if ($size -le 0) { throw "completions cache is empty" }
          Write-Output "completions cache OK ($size bytes)"

      # ── Mux auto-install verification (mux rows only). `atomic workflow
      #    list` is non-info → autoSyncIfStale → ensureTmuxInstalled fires
      #    when hasRequiredMuxBinary() returns false, installs tmux/psmux
      #    via the host package manager, and the wrapper (Windows) /
      #    PATH export (Unix) makes it visible in this shell.
      - name: Verify mux auto-install (Unix mux row)
        if: matrix.mux && runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          atomic --version
          atomic workflow list >/dev/null
          which tmux
          tmux -V

      - name: Verify mux auto-install (Windows mux row)
        if: matrix.mux && runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          . $PROFILE
          atomic --version
          atomic workflow list | Out-Null
          $mux = Get-Command psmux -ErrorAction SilentlyContinue
          if (-not $mux) { $mux = Get-Command pmux -ErrorAction SilentlyContinue }
          if (-not $mux) { $mux = Get-Command tmux -ErrorAction SilentlyContinue }
          if (-not $mux) {
            Write-Output "===== current `$env:Path ====="
            $env:Path -split ';' | ForEach-Object { Write-Output $_ }
            throw "wrapper failed: no multiplexer on `$env:Path after auto-install"
          }
          Write-Output "wrapper OK: $($mux.Name) resolves to $($mux.Source)"

      # ────────────────────────────────────────────────────────────────────
      # ── `atomic update` lifecycle ──────────────────────────────────────
      # ────────────────────────────────────────────────────────────────────
      # `atomic update` is only a real upgrade path for the standalone
      # binary install. PM-managed installs (bun/npm/pnpm/yarn) just print
      # guidance pointing at the PM's own update command.
      #
      #   1. PM `--check` smoke   — runs against the bun-installed wrapper
      #                             and asserts the rendered note tells
      #                             the user to run `bun update -g`.
      #   2. Binary download path — generates release-assets, points the
      #                             CLI at a local mock GitHub Releases
      #                             server (script/ci/mock-gh-releases.ts),
      #                             and runs the installed binary so
      #                             detection returns "binary". Exercises
      #                             real download / verify / swap / spawn
      #                             on every supported platform.
      #
      # Caveat (binary path): the same compiled binary is served as the
      # vN+1 asset to keep the matrix cheap, so `atomic --version` still
      # reports vN after the swap. The test asserts the plumbing
      # succeeded, not that the version string advanced.
      - name: Compute host target
        id: host
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   plat="linux"   ;;
            macOS)   plat="darwin"  ;;
            Windows) plat="windows" ;;
            *) echo "unknown runner.os: ${{ runner.os }}"; exit 1 ;;
          esac
          arch="${{ matrix.arch }}"
          libc_suffix=""
          if [ "${{ matrix.libc }}" = "musl" ]; then libc_suffix="-musl"; fi
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          echo "host=${plat}-${arch}${libc_suffix}" >> $GITHUB_OUTPUT
          echo "ext=${ext}" >> $GITHUB_OUTPUT

      # Generates packages/atomic/release-assets/{atomic-<host>[.exe], manifest.json}
      # from the matrix-built dist/ artifacts. Mock server reads from this
      # directory; the manifest's sha256 must match the served binary.
      - name: Generate release-assets manifest
        shell: bash
        run: bun packages/atomic/script/release-assets.ts

      # ── 1. PM `--check` smoke ─────────────────────────────────────────
      # `atomic` on PATH resolves to the bun-installed wrapper, so
      # detectInstallMethod returns "bun" and `--check` should render
      # a PM-update hint, not version metadata.
      - name: atomic update --check (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          out=$(atomic update --check 2>&1) || {
            echo "$out"
            echo "atomic update --check exited non-zero"
            exit 1
          }
          echo "$out"
          echo "$out" | grep -q "installed via bun"           || { echo "missing 'installed via bun'"; exit 1; }
          echo "$out" | grep -q "bun update -g @bastani/atomic" || { echo "missing PM update hint"; exit 1; }

      - name: atomic update --check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          $out = atomic update --check 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            Write-Output $out
            throw "atomic update --check exited $LASTEXITCODE"
          }
          Write-Output $out
          if ($out -notmatch 'installed via bun')             { throw "missing 'installed via bun'" }
          if ($out -notmatch 'bun update -g @bastani/atomic') { throw "missing PM update hint" }

      # ── 2. Binary download path via mock GitHub Releases server ───────
      # Uses port 4874 (verdaccio is on 4873). MOCK_VERSION=999.0.0 forces
      # the `isNewer` check inside `runBinaryUpdate` to return true so the
      # download/verify/swap path actually runs.
      - name: atomic update via mock GitHub server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          HOST: ${{ steps.host.outputs.host }}
          EXT: ${{ steps.host.outputs.ext }}
        run: |
          set -euo pipefail
          assets="$PWD/packages/atomic/release-assets"
          test -f "$assets/atomic-${HOST}${EXT}" || { echo "host asset missing in $assets"; ls -la "$assets"; exit 1; }
          test -f "$assets/manifest.json" || { echo "manifest.json missing in $assets"; exit 1; }

          MOCK_PORT=4874 \
          MOCK_VERSION="999.0.0" \
          MOCK_ASSET_DIR="$assets" \
          bun packages/atomic/script/ci/mock-gh-releases.ts \
            > "$RUNNER_TEMP/mock-gh.log" 2>&1 &
          mock_pid=$!
          trap 'kill -TERM $mock_pid 2>/dev/null || true' EXIT

          for i in $(seq 1 30); do
            if grep -q "^READY " "$RUNNER_TEMP/mock-gh.log" 2>/dev/null; then break; fi
            sleep 0.5
          done
          if ! grep -q "^READY " "$RUNNER_TEMP/mock-gh.log"; then
            echo "mock-gh-releases failed to start"
            cat "$RUNNER_TEMP/mock-gh.log" || true
            exit 1
          fi

          export ATOMIC_GITHUB_API_BASE="http://127.0.0.1:4874/repos/flora131/atomic"
          binary="$HOME/.local/bin/atomic"
          test -x "$binary" || { echo "expected installed binary at $binary"; exit 1; }

          # Run the update via the *installed* binary so detectInstallMethod
          # returns "binary" (process.execPath == getInstallPaths().binPath).
          "$binary" update --version 999.0.0
          # Sanity: post-update binary still runs.
          "$binary" --version

      - name: atomic update via mock GitHub server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          HOST: ${{ steps.host.outputs.host }}
          EXT: ${{ steps.host.outputs.ext }}
        run: |
          $assets = Join-Path $PWD "packages\atomic\release-assets"
          $hostAsset = Join-Path $assets "atomic-$env:HOST$env:EXT"
          if (-not (Test-Path $hostAsset))                       { throw "host asset missing: $hostAsset" }
          if (-not (Test-Path (Join-Path $assets 'manifest.json'))) { throw "manifest.json missing in $assets" }

          $log = Join-Path $env:RUNNER_TEMP "mock-gh.log"
          $mockEnv = @{
            MOCK_PORT       = "4874"
            MOCK_VERSION    = "999.0.0"
            MOCK_ASSET_DIR  = $assets
          }
          foreach ($kv in $mockEnv.GetEnumerator()) { Set-Item -Path "Env:$($kv.Key)" -Value $kv.Value }

          $mock = Start-Process -FilePath "bun" `
            -ArgumentList "packages/atomic/script/ci/mock-gh-releases.ts" `
            -NoNewWindow -PassThru `
            -RedirectStandardOutput $log -RedirectStandardError "$log.err"
          try {
            for ($i = 0; $i -lt 30; $i++) {
              if ((Test-Path $log) -and ((Get-Content $log -Raw -ErrorAction SilentlyContinue) -match '^READY ')) { break }
              Start-Sleep -Milliseconds 500
            }
            if (-not ((Get-Content $log -Raw -ErrorAction SilentlyContinue) -match '^READY ')) {
              if (Test-Path $log)       { Get-Content $log }
              if (Test-Path "$log.err") { Get-Content "$log.err" }
              throw "mock-gh-releases failed to start"
            }

            $env:ATOMIC_GITHUB_API_BASE = "http://127.0.0.1:4874/repos/flora131/atomic"
            $binary = Join-Path $env:LOCALAPPDATA "atomic\bin\atomic.exe"
            if (-not (Test-Path $binary)) { throw "expected installed binary at $binary" }

            & $binary update --version 999.0.0
            if ($LASTEXITCODE -ne 0) { throw "atomic update exited $LASTEXITCODE" }
            & $binary --version
            if ($LASTEXITCODE -ne 0) { throw "atomic --version exited $LASTEXITCODE post-update" }
          } finally {
            if (-not $mock.HasExited) { Stop-Process -Id $mock.Id -Force -ErrorAction SilentlyContinue }
          }

      # ── `atomic uninstall`: removes launcher / rc snippets / completions
      #    cache but preserves ~/.atomic (no --purge flag).
      - name: atomic uninstall (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          atomic uninstall
          test ! -f "$HOME/.local/bin/atomic" || { echo "launcher still present"; exit 1; }
          test ! -d "$HOME/.atomic/completions" || { echo "completions cache still present"; exit 1; }
          for rc in "$HOME/.bashrc" "$HOME/.zshrc" "$HOME/.profile" "$HOME/.config/fish/config.fish"; do
            if [ -f "$rc" ] && grep -q "# Atomic CLI" "$rc"; then
              echo "rc file $rc still has atomic snippet"; exit 1
            fi
          done
          test -d "$HOME/.atomic" || { echo "~/.atomic was wrongly purged"; exit 1; }
          echo "uninstall verified"

      - name: atomic uninstall (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          atomic uninstall
          $binary = Join-Path $env:LOCALAPPDATA "atomic\bin\atomic.exe"
          $cache = Join-Path $env:USERPROFILE ".atomic\completions"
          $atomicHome = Join-Path $env:USERPROFILE ".atomic"
          $userPath2 = [Environment]::GetEnvironmentVariable('Path','User')
          $binDir = Join-Path $env:LOCALAPPDATA "atomic\bin"
          if (Test-Path $binary) { throw "launcher still present at $binary" }
          if (Test-Path $cache) { throw "completions cache still present at $cache" }
          if ($userPath2 -and $userPath2.ToLower().Contains($binDir.ToLower())) {
            throw "user PATH still contains $binDir"
          }
          if (-not (Test-Path $atomicHome)) {
            throw "~/.atomic was wrongly purged (no --purge flag)"
          }
          $profilePath = $PROFILE.CurrentUserCurrentHost
          if ((Test-Path $profilePath) -and ((Get-Content $profilePath -Raw) -match "# Atomic CLI")) {
            throw "PowerShell profile still has atomic snippet"
          }
          Write-Output "uninstall verified"

      # ── `atomic uninstall --purge`: full nuke including ~/.atomic.
      - name: Re-install for purge test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          atomic install

      - name: Re-install for purge test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          atomic install

      - name: atomic uninstall --purge (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          atomic uninstall --purge
          test ! -d "$HOME/.atomic" || { echo "~/.atomic was NOT purged"; exit 1; }
          echo "--purge verified"

      - name: atomic uninstall --purge (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $userPath = [Environment]::GetEnvironmentVariable('Path','User')
          if ($userPath) { $env:Path = "$env:Path;$userPath" }
          atomic uninstall --purge
          $atomicHome = Join-Path $env:USERPROFILE ".atomic"
          if (Test-Path $atomicHome) {
            throw "~/.atomic was NOT purged (still at $atomicHome)"
          }
          Write-Output "--purge verified"

  publish:
    name: Publish to npm
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.npm-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run typecheck

      - name: Run tests
        run: bun test 2>&1 | cat
        env:
          ATOMIC_SKIP_PUBLISH_BUILD_TEST: "1"
          # The validate matrix (above) has already exercised the SDK
          # build + bundled-cli verification across 6 OS×arch
          # combinations. Skip the `bun run build` step embedded in the
          # SDK build test here to save ~5–10 s on the publish runner.
          ATOMIC_SKIP_SDK_BUILD_TEST: "1"

      - name: Determine npm publish tag
        id: npm-tag
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=next" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v8
        with:
          path: packages/atomic/dist/
          pattern: '*'
          merge-multiple: false

      - name: Publish SDK to npm
        run: bun packages/atomic-sdk/script/publish.ts
        env:
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}

      - name: Publish wrapper and platform packages to npm
        run: bun packages/atomic/script/publish.ts
        env:
          NPM_TAG: ${{ steps.npm-tag.outputs.tag }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [publish]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get version from package.json
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Determine release type
        id: release-type
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Bundle configs for release
        run: bun packages/atomic/script/bundle-configs.ts "${{ steps.version.outputs.version }}"

      # Pull every per-target binary built in the matrix `build` job back
      # into packages/atomic/dist/<target>/bin/atomic[.exe], the layout
      # release-assets.ts expects.
      - name: Download per-platform binaries
        uses: actions/download-artifact@v8
        with:
          path: packages/atomic/dist/
          pattern: '*'
          merge-multiple: false

      - name: Generate release binaries + manifest
        run: bun packages/atomic/script/release-assets.ts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ steps.release-type.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release-type.outputs.make_latest }}
          generate_release_notes: true
          files: |
            atomic-configs-v${{ steps.version.outputs.version }}.zip
            packages/atomic/release-assets/atomic-*
            packages/atomic/release-assets/manifest.json

