name: CI

on:
    pull_request:
        branches: [main]
        paths:
            - "package.json"
            - "**/package.json"
            - "bun.lock"
            - "tsconfig.json"
            - "**/*.ts"
            - "**/*.tsx"
            - "**/*.js"
            - "**/*.jsx"
            - "**/*.mjs"
            - "verdaccio.yaml"
            - ".github/workflows/ci.yml"

jobs:
    checks:
        name: Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Run type checking
              run: bun run typecheck

            - name: Run linting
              run: bun run lint

            - name: Run tests with coverage
              run: |
                  set -o pipefail
                  bun run test:coverage 2>&1 | cat
            - name: Validate SDK build
              run: bun run build

    # Pre-publish validation. Builds the host-target binary, publishes the
    # SDK + per-platform package + synthesised wrapper to a throwaway
    # verdaccio, then `bun install -g`s the wrapper from that registry and
    # smoke-tests it. Catches publish-layout regressions (wrapper synth,
    # optionalDependencies resolution, postinstall, exports rewrite) at PR
    # time instead of after a real npm publish lands.
    validate-publish:
        name: Validate publish (verdaccio)
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"

            - name: Install dependencies
              run: bun install

            - name: Build host-target binary
              run: bun packages/atomic/script/build.ts

            - name: Start verdaccio
              run: |
                  npm install -g verdaccio
                  mkdir -p /tmp/verdaccio
                  verdaccio --config verdaccio.yaml &
                  for i in {1..30}; do
                      if curl -sf http://localhost:4873/-/ping >/dev/null; then
                          echo "verdaccio up"; exit 0
                      fi
                      sleep 1
                  done
                  echo "verdaccio failed to start"; exit 1

            - name: Configure npm auth for verdaccio
              run: echo "//localhost:4873/:_authToken=fake-token" >> ~/.npmrc

            - name: Publish SDK to verdaccio
              run: bun packages/atomic-sdk/script/publish.ts
              env:
                  NPM_REGISTRY: http://localhost:4873

            # SDK self-containment regression guard. Installs
            # @bastani/atomic-sdk into a fresh project (no monorepo, no
            # user-facing CLI alongside) and asserts dist/cli.js is
            # present, the resolver lands inside the installed SDK, and
            # the bundled dispatcher actually runs. Cheap PR-time check
            # for the Linux-x64 case; the publish workflow re-runs this
            # across the full 6-OS×arch matrix before npm publish.
            - name: Verify SDK is self-contained
              run: |
                  VERSION=$(jq -r .version package.json)
                  bun packages/atomic-sdk/script/verify-bundled-cli.ts \
                      http://localhost:4873 \
                      "$VERSION"

            - name: Publish wrapper + host platform package to verdaccio
              run: bun packages/atomic/script/publish.ts
              env:
                  NPM_REGISTRY: http://localhost:4873

            - name: Smoke install from verdaccio
              run: |
                  set -e
                  VERSION=$(jq -r .version package.json)
                  bun install -g "@bastani/atomic@${VERSION}" --registry http://localhost:4873
                  atomic --version | grep -q "$VERSION"
                  atomic workflow list >/dev/null
                  # `--preflight-only` runs onboarding without spawning the
                  # agent or checking executables/auth — exercises the chat
                  # launch path (config sync, project setup) headlessly.
                  for agent in claude copilot opencode; do
                      atomic chat -a "$agent" --preflight-only
                  done
                  # Catches the `/$bunfs/...` runtime-asset regression that
                  # caused `atomic chat` to silently fall back to a non-tmux
                  # spawn on every published binary. Mirrors the per-platform
                  # check below, but exercised here against the freshly
                  # `bun install -g`'d wrapper to cover the end-to-end
                  # publish layout.
                  atomic _runtime-assets-smoke

    # Per-platform regression test for the bunfs-materialization bug:
    # `with { type: "file" }` imports resolve to `/$bunfs/...` paths inside
    # a compiled binary, which Bun APIs can read but spawned OS processes
    # (tmux, bun run, ...) cannot. `runtime-assets.ts` copies each asset
    # to `~/.atomic/runtime/<sdk-version>/` on first use; the smoke command
    # asserts the materialized paths are subprocess-readable AND that
    # tmux/psmux can actually load the conf and create a session.
    #
    # We run on Linux / macOS / Windows because the bug is platform-specific
    # in two ways: the bunfs path shape differs (`/$bunfs/...` vs
    # `<DRIVE>:\~BUN\...`), and the multiplexer (tmux vs psmux) reads the
    # conf via different syscall paths. A regression on any one of them
    # would re-introduce the silent-fallback behavior on that platform.
    runtime-assets-smoke:
        name: Runtime assets smoke (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Install tmux (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get update -qq && sudo apt-get install -y tmux

            - name: Install tmux (macOS)
              if: runner.os == 'macOS'
              run: brew install tmux || true

            # psmux isn't on the official chocolatey/winget feeds with a
            # stable id we can rely on, so download the pinned GitHub
            # release directly — same path as `installPsmuxFromGitHubRelease`
            # in spawn.ts, but inline so the test doesn't depend on the
            # binary it's about to test.
            - name: Install psmux (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              env:
                  # Authenticated requests get the 1000/hr per-repo rate limit; the
                  # unauthenticated 60/hr limit is shared across all GitHub-hosted
                  # runners on the same egress IP and trips intermittently on busy days.
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  $latest = Invoke-RestMethod `
                      -Headers @{
                          Accept        = 'application/vnd.github+json'
                          Authorization = "Bearer $env:GH_TOKEN"
                      } `
                      -Uri 'https://api.github.com/repos/psmux/psmux/releases/latest'
                  $asset = $latest.assets | Where-Object { $_.name -like '*windows-x64.zip' } | Select-Object -First 1
                  if (-not $asset) { throw 'No psmux windows-x64 release asset found' }
                  $tmp = New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP 'psmux')
                  $zip = Join-Path $tmp 'psmux.zip'
                  Invoke-WebRequest -UseBasicParsing -Uri $asset.browser_download_url -OutFile $zip
                  Expand-Archive -LiteralPath $zip -DestinationPath $tmp -Force
                  $bin = Join-Path $env:LOCALAPPDATA 'Programs\psmux'
                  New-Item -ItemType Directory -Force -Path $bin | Out-Null
                  Get-ChildItem $tmp -Filter 'psmux.exe' -Recurse | ForEach-Object {
                      Copy-Item $_.FullName -Destination (Join-Path $bin 'psmux.exe') -Force
                  }
                  echo $bin >> $env:GITHUB_PATH

            - name: Build host-target binary
              run: bun packages/atomic/script/build.ts

            # Wipe any cache the build step might have warmed via dev-mode
            # imports so the smoke step exercises the real first-run
            # materialize-from-bunfs code path, not a hot cache.
            - name: Clear runtime-assets cache (Unix)
              if: runner.os != 'Windows'
              shell: bash
              run: rm -rf "$HOME/.atomic/runtime"

            - name: Clear runtime-assets cache (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $cache = Join-Path $env:USERPROFILE '.atomic\runtime'
                  if (Test-Path $cache) { Remove-Item -Recurse -Force $cache }

            - name: Run runtime-assets smoke
              shell: bash
              run: |
                  set -e
                  ATOMIC=$(find packages/atomic/dist -type f -name 'atomic*' | head -n 1)
                  if [ -z "$ATOMIC" ]; then
                      echo "Could not locate built binary under packages/atomic/dist"
                      exit 1
                  fi
                  echo "Smoke-testing: $ATOMIC"
                  "$ATOMIC" _runtime-assets-smoke

            # End-to-end chat-launch smoke: invokes the *full* chat command
            # (`atomic chat -a opencode --no-login`) against a stub agent on
            # PATH and asserts the agent ended up running INSIDE tmux/psmux
            # (i.e. `$TMUX` / `$PSMUX` is populated when the stub runs).
            #
            # The chat code's first guard is `process.stdin.isTTY`; GitHub
            # Actions steps run with piped stdio, so we have to manufacture
            # a real PTY. `chat-smoke.ts` uses `bun-pty` (forkpty on Unix,
            # ConPTY on Windows) so the same invocation works on every
            # runner — replacing the prior `script -qfc` / `Start-Process`
            # split that was non-portable (GNU `timeout` missing on macOS,
            # `Start-Process -RedirectStandardOutput` allocates pipes not
            # a PTY on Windows).
            #
            # `--no-login` skips the SDK auth probe so we can pair this with
            # a stub `opencode` binary (opencode's auth check is a no-op
            # anyway, but the flag keeps the test agent-agnostic).
            - name: Run chat-launch smoke
              shell: bash
              run: |
                  set -e
                  ATOMIC=$(find packages/atomic/dist -type f \( -name 'atomic' -o -name 'atomic.exe' \) | head -n 1)
                  if [ -z "$ATOMIC" ]; then
                      echo "Could not locate built binary under packages/atomic/dist"
                      exit 1
                  fi
                  for agent in opencode claude copilot; do
                      echo "::group::chat-smoke ${agent}"
                      bun packages/atomic/script/chat-smoke.ts "$ATOMIC" "$agent"
                      echo "::endgroup::"
                  done

    # Cross-platform onboarding contract test. Reuses the host-target
    # binary built per runner and asserts every agent's declared
    # `onboarding_files` (claude/copilot/opencode) materialises in a
    # fresh project root after `atomic chat -a <agent> --preflight-only`.
    #
    # Why this needs a dedicated job:
    #   - `validate-publish` runs preflight but doesn't assert files
    #     landed on disk (a silent no-op would slip through).
    #   - The original test was Linux-only; the bug fixed by this PR
    #     (copilot's empty `onboarding_files` → no `.mcp.json`) was a
    #     config-data regression with no platform-specific aspect, but
    #     the resolver code path (embedded-asset extraction, `~/...`
    #     destination expansion) does differ across Linux/macOS/Windows.
    #     A cross-platform contract test catches both classes of bug.
    #
    # The job sets `RUN_CI_E2E=1` to opt the gated test in.
    onboarding-matrix:
        name: Onboarding preflight (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}

        steps:
            - uses: actions/checkout@v6

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Build host-target binary
              run: bun packages/atomic/script/build.ts

            - name: Run onboarding preflight test
              shell: bash
              env:
                  RUN_CI_E2E: "1"
              run: bun test tests/ci/onboarding.test.ts
